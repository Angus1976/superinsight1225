services:
  # ===========================================================================
  # Frontend
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: superinsight-frontend
    ports:
      # 宿主机 15173 → 容器内 Vite 5173（便于与本地其它 5173 服务区分）
      - "15173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Core Application
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superinsight-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://superinsight:password@postgres:5432/superinsight
      - REDIS_URL=redis://redis:6379/0
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_USERNAME=admin@example.com
      - LABEL_STUDIO_PASSWORD=admin
      - LABEL_STUDIO_API_TOKEN=${LABEL_STUDIO_API_TOKEN}
      - ARGILLA_URL=http://argilla:6900
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY}
      # 浏览器从宿主机 15173 访问前端时，API 需允许该 Origin
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:15173,http://127.0.0.1:15173,http://127.0.0.1:5173
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      label-studio:
        condition: service_started
      argilla:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./logs:/var/log/superinsight
      - ./uploads:/app/uploads
    restart: unless-stopped

  # ===========================================================================
  # Celery Worker (Background Tasks)
  # ===========================================================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superinsight-celery-worker
    command: celery -A src.services.structuring_pipeline worker --loglevel=info
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://superinsight:password@postgres:5432/superinsight
      - REDIS_URL=redis://redis:6379/0
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_USERNAME=admin@example.com
      - LABEL_STUDIO_PASSWORD=admin
      - LABEL_STUDIO_API_TOKEN=${LABEL_STUDIO_API_TOKEN}
      - ARGILLA_URL=http://argilla:6900
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:15173,http://127.0.0.1:15173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/var/log/superinsight
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.services.structuring_pipeline inspect ping --timeout 5 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Database
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: superinsight-postgres
    environment:
      - POSTGRES_USER=superinsight
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=superinsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superinsight"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # 一次性：迁移 + 幂等种子（保留已有 volume 数据，仅升级 schema / 补缺省数据）
  # ===========================================================================
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superinsight-db-migrate
    environment:
      - DATABASE_URL=postgresql://superinsight:password@postgres:5432/superinsight
      - APP_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      # env.py 会 import src.database.models → Label Studio；与 app 保持一致以免迁移失败
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_USERNAME=admin@example.com
      - LABEL_STUDIO_PASSWORD=admin
      - LABEL_STUDIO_API_TOKEN=${LABEL_STUDIO_API_TOKEN}
      # 若数据库 alembic_version 指向当前仓库不存在的 revision，自动 stamp 到本仓库 heads（不删数据）
      - ALEMBIC_AUTO_REPAIR_VERSION=${ALEMBIC_AUTO_REPAIR_VERSION:-true}
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    working_dir: /app
    command: ["python", "-u", "scripts/bootstrap_docker.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: superinsight-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # Label Studio (with SSO support)
  # ===========================================================================
  label-studio:
    build:
      context: ./deploy/label-studio
      dockerfile: Dockerfile
    container_name: superinsight-label-studio
    ports:
      - "8080:8080"
    environment:
      # Core configuration
      - LABEL_STUDIO_HOST=http://localhost:8080
      - LABEL_STUDIO_USERNAME=admin@example.com
      - LABEL_STUDIO_PASSWORD=admin
      # Language configuration (Django i18n)
      - LANGUAGE_CODE=zh-hans
      - LABEL_STUDIO_DEFAULT_LANGUAGE=zh
      - LABEL_STUDIO_ENABLE_LANGUAGE_PARAM=true
      # SSO configuration - DISABLED to allow legacy token authentication
      - LABEL_STUDIO_SSO_ENABLED=false
      # Other settings
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=false
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data
    volumes:
      - label_studio_data:/label-studio/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Argilla
  # ===========================================================================
  argilla:
    image: argilla/argilla-server:latest
    container_name: superinsight-argilla
    ports:
      - "6900:6900"
    environment:
      - ARGILLA_HOME_PATH=/argilla
      - ARGILLA_ELASTICSEARCH=http://elasticsearch:9200
      - ARGILLA_DATABASE_URL=postgresql://superinsight:password@postgres:5432/argilla
      - ARGILLA_REDIS_URL=redis://redis:6379/0
    depends_on:
      - elasticsearch
      # - postgres  # 已禁用，使用宿主机 PostgreSQL
      - redis
    volumes:
      - argilla_data:/argilla
    user: "0:0"  # Run as root to fix permission issues
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6900/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Elasticsearch (for Argilla)
  # ===========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: superinsight-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Ollama (Local LLM)
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: superinsight-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Prometheus (Metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: superinsight-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Grafana (Monitoring Dashboard)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: superinsight-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  # 持久化 PostgreSQL 数据。请勿使用 `docker compose down -v`，否则会删除该卷及所有业务数据。
  postgres_data:
    driver: local
  redis_data:
    driver: local
  label_studio_data:
    driver: local
  argilla_data:
    driver: local
  elasticsearch_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    name: superinsight_network
    driver: bridge
