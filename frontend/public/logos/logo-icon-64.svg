<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="wGrad64" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C5CDD4"/>
      <stop offset="15%" stop-color="#ADB5BD"/>
      <stop offset="50%" stop-color="#8B9299"/>
      <stop offset="85%" stop-color="#6B7278"/>
      <stop offset="100%" stop-color="#5B6269"/>
    </linearGradient>
    
    <linearGradient id="metalShine64" x1="0%" y1="0%" x2="100%" y2="100%">
