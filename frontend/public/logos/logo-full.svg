<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096DD9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="labelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52C41A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389E0D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="40" cy="40" r="32" fill="url(#bgGradient)" opacity="0.1"/>

  <!-- Data Grid Lines -->
  <g stroke="#1890FF" stroke-width="0.5" opacity="0.3">
    <line x1="20" y1="20" x2="60" y2="20"/>
    <line x1="20" y1="30" x2="60" y2="30"/>
    <line x1="20" y1="40" x2="60" y2="40"/>
    <line x1="20" y1="50" x2="60" y2="50"/>
    <line x1="20" y1="60" x2="60" y2="60"/>
    <line x1="20" y1="20" x2="20" y2="60"/>
    <line x1="60" y1="20" x2="60" y2="60"/>
  </g>

  <!-- W Shape (Brand Mark) -->
  <path d="M 25 28 L 30 45 L 35 28 L 40 45 L 45 28 L 50 45 L 55 28" 
        stroke="#1890FF" 
        stroke-width="2.5" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Data Points (Highlighted) -->
  <circle cx="30" cy="45" r="2.5" fill="white" filter="url(#glow)"/>
  <circle cx="40" cy="45" r="2.5" fill="white" filter="url(#glow)"/>
  <circle cx="50" cy="45" r="2.5" fill="white" filter="url(#glow)"/>

  <!-- Annotation Label Icon -->
  <g transform="translate(48, 22)">
    <rect x="0" y="0" width="12" height="8" rx="2" fill="url(#labelGradient)"/>
    <circle cx="6" cy="10" r="1.5" fill="url(#labelGradient)"/>
    <line x1="6" y1="8" x2="6" y2="10" stroke="url(#labelGradient)" stroke-width="1"/>
  </g>

  <!-- Data Flow Curves -->
  <g stroke="#1890FF" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 24 52 Q 28 48, 32 52"/>
    <path d="M 34 52 Q 38 48, 42 52"/>
    <path d="M 44 52 Q 48 48, 52 52"/>
  </g>

  <!-- AI Indicator (3-layer concentric circles) -->
  <g opacity="0.6">
    <circle cx="56" cy="32" r="4" fill="none" stroke="#722ED1" stroke-width="0.5"/>
    <circle cx="56" cy="32" r="3" fill="none" stroke="#722ED1" stroke-width="0.5"/>
    <circle cx="56" cy="32" r="1.5" fill="#722ED1"/>
  </g>

  <!-- Text: 问视间 -->
  <text x="90" y="38" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="600" fill="currentColor">
    问视间
  </text>

  <!-- Text: SuperInsight -->
  <text x="90" y="56" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="currentColor" opacity="0.7">
    SuperInsight
  </text>

  <!-- Subtitle: 数据标注，智见未来 -->
  <text x="90" y="70" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="9" fill="currentColor" opacity="0.5">
    数据标注，智见未来
  </text>
</svg>
