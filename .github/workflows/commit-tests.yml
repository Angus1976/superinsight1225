name: Commit Tests

# Requirement 10.1: Execute unit tests on every code commit
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  workflow_call:
    secrets: inherit
    inputs:
      hypothesis_profile:
        description: 'HYPOTHESIS_PROFILE for backend pytest (see tests/conftest.py). Empty = infer from push ref.'
        type: string
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  BACKEND_URL: 'http://localhost:18080'
  FRONTEND_URL: 'http://localhost:3000'

jobs:
  # =============================================================================
  # Backend Unit Tests
  # =============================================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov hypothesis
          pip install -r requirements.txt || true

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL=redis://localhost:6379/0
          SECRET_KEY=test-secret-key-for-testing
          JWT_SECRET_KEY=test-jwt-secret-key
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          API_V1_PREFIX=/api/v1
          SERVER_NAME=test-server
          EOF

      - name: Set HYPOTHESIS_PROFILE for backend pytest
        run: |
          case "${{ github.event_name }}" in
            workflow_call)
              P='${{ inputs.hypothesis_profile }}'
              if [ -n "$P" ]; then
                echo "HYPOTHESIS_PROFILE=$P" >> "$GITHUB_ENV"
              else
                echo "HYPOTHESIS_PROFILE=default" >> "$GITHUB_ENV"
              fi
              ;;
            push)
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                echo "HYPOTHESIS_PROFILE=ci" >> "$GITHUB_ENV"
              else
                echo "HYPOTHESIS_PROFILE=default" >> "$GITHUB_ENV"
              fi
              ;;
            workflow_dispatch)
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                echo "HYPOTHESIS_PROFILE=ci" >> "$GITHUB_ENV"
              else
                echo "HYPOTHESIS_PROFILE=default" >> "$GITHUB_ENV"
              fi
              ;;
            *)
              echo "HYPOTHESIS_PROFILE=default" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Run backend unit tests
        run: |
          pytest tests/unit/ \
            --tb=short \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=json:.coverage-backend.json \
            --cov-fail-under=80 \
            --maxfail=10 \
            -x

      - name: Run backend property-based tests
        run: |
          pytest tests/ \
            -m "property" \
            --tb=short \
            -v \
            --hypothesis-seed=0 \
            --maxfail=5

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: .coverage-backend.json
          retention-days: 7

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-html-coverage
          path: htmlcov/
          retention-days: 7

  # =============================================================================
  # Frontend Unit Tests
  # =============================================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Production build (tsc + Vite, TC-P0-05)
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: frontend
        run: |
          npm run test:unit \
            -- --run \
            --reporter=verbose \
            --coverage

      - name: Check coverage thresholds
        working-directory: frontend
        run: |
          npx vitest run --coverage --reporter=verbose 2>&1 | tee coverage-output.txt
          # Check if coverage meets threshold
          if grep -q "Coverage below threshold" coverage-output.txt; then
            echo "::error::Frontend coverage below 80% threshold"
            exit 1
          fi

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          retention-days: 7

  # =============================================================================
  # Combined Coverage Report
  # =============================================================================
  coverage-summary:
    name: Coverage Summary
    needs: [backend-unit-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: reports/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: reports/frontend/

      - name: Generate combined coverage summary
        run: |
          echo "=== Commit Test Coverage Summary ==="
          echo ""
          echo "Backend coverage report: reports/.coverage-backend.json"
          echo "Frontend coverage report: reports/frontend/coverage-summary.json"
          echo ""
          echo "Coverage threshold: 80%"
          echo ""
          # Check if both coverage reports exist
          if [ -f "reports/.coverage-backend.json" ]; then
            echo "Backend tests: PASSED (coverage >= 80%)"
          else
            echo "Backend tests: No coverage report found"
          fi
          if [ -f "reports/frontend/coverage-summary.json" ]; then
            echo "Frontend tests: PASSED (coverage >= 80%)"
          else
            echo "Frontend tests: No coverage report found"
          fi

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: commit-test-coverage
          path: reports/
          retention-days: 7

  # =============================================================================
  # Postgres backup/restore drill (TC-P1-04 local equivalent; scripts/pg-backup-restore-drill.sh)
  # =============================================================================
  postgres-backup-drill:
    name: Postgres Backup/Restore Drill
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL clients
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run backup/restore drill
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_password
          PGDATABASE: test_db
          USE_DOCKER_EXEC: '0'
        run: bash scripts/pg-backup-restore-drill.sh

  # =============================================================================
  # Quick Validation (aggregate gate)
  # =============================================================================
  quick-validation:
    name: Quick Validation
    needs: [backend-unit-tests, frontend-unit-tests, postgres-backup-drill]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check test results
        run: |
          echo "=== Commit Test Results ==="
          echo "Backend unit tests: ${{ needs.backend-unit-tests.result }}"
          echo "Frontend unit tests + production build: ${{ needs.frontend-unit-tests.result }}"
          echo "Postgres backup/restore drill: ${{ needs.postgres-backup-drill.result }}"
          echo ""
          if [[ "${{ needs.backend-unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.frontend-unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.postgres-backup-drill.result }}" == "success" ]]; then
            echo "✓ All commit tests passed!"
            exit 0
          else
            echo "✗ Some tests failed. Check the detailed reports for more information."
            exit 1
          fi