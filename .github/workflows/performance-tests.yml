name: Performance Tests

# Requirement 10.4: Execute performance tests on scheduled intervals (daily)
on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      concurrent_users:
        description: 'Number of concurrent users'
        required: false
        default: '100'
      duration:
        description: 'Test duration in seconds'
        required: false
        default: '300'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  BACKEND_URL: 'http://localhost:18080'
  FRONTEND_URL: 'http://localhost:3000'

jobs:
  # =============================================================================
  # Performance Test Setup
  # =============================================================================
  setup:
    name: Setup Performance Test Environment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      concurrent_users: ${{ steps.set-config.outputs.concurrent_users }}
      duration: ${{ steps.set-config.outputs.duration }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set test configuration
        id: set-config
        run: |
          echo "concurrent_users=${{ github.event.inputs.concurrent_users || 100 }}" >> $GITHUB_OUTPUT
          echo "duration=${{ github.event.inputs.duration || 300 }}" >> $GITHUB_OUTPUT
          echo "Concurrent users: ${{ steps.set-config.outputs.concurrent_users }}"
          echo "Duration: ${{ steps.set-config.outputs.duration }}"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-perf-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-perf-

      - name: Install performance testing tools
        run: |
          python -m pip install --upgrade pip
          pip install locust pytest-benchmark
          pip install -r requirements.txt || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

  # =============================================================================
  # Load Tests
  # =============================================================================
  load-tests:
    name: Load Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL=redis://localhost:6379/0
          SECRET_KEY=test-secret-key-for-testing
          JWT_SECRET_KEY=test-jwt-secret-key
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          API_V1_PREFIX=/api/v1
          SERVER_NAME=test-server
          EOF

      - name: Start backend server
        run: |
          source .env.test
          uvicorn src.app:app --host 0.0.0.0 --port 18080 &
          sleep 5
          curl -f http://localhost:18080/health || exit 1

      - name: Run Locust load test
        run: |
          cat > locustfile.py << 'EOF'
          from locust import HttpUser, task, between, events
          from locust.runners import MasterRunner
          import time

          class APIUser(HttpUser):
              wait_time = between(1, 3)
              
              @task(1)
              def health_check(self):
                  self.client.get("/health")
              
              @task(2)
              def api_endpoints(self):
                  # Test various API endpoints
                  self.client.get("/api/v1/health")
                  self.client.get("/api/v1/version")

          @events.init.add_listener
          def on_locust_init(environment, **kwargs):
              if isinstance(environment.runner, MasterRunner):
                  environment.runner.register_message(
                      "test_complete",
                      lambda msg: environment.runner.quit()
                  )

          @events.test_stop.add_listener
          def on_test_stop(environment, **kwargs):
              pass
          EOF

          locust \
            --users=${{ needs.setup.outputs.concurrent_users }} \
            --spawn-rate=10 \
            --run-time=${{ needs.setup.outputs.duration }}s \
            --headless \
            --json \
            --output=locust-results.json \
            --html=locust-report.html

      - name: Parse Locust results
        run: |
          python3 << 'EOF'
          import json
          import sys

          try:
              with open('locust-results.json', 'r') as f:
                  data = json.load(f)
              
              stats = data.get('stats', [])
              print("=== Load Test Results ===")
              print(f"Total Requests: {data.get('total_requests', 0)}")
              print(f"Failed Requests: {data.get('failures', 0)}")
              print(f"Total Time: {data.get('total_time', 0)}s")
              print("")
              print("Per Endpoint Statistics:")
              print("-" * 60)
              
              for stat in stats:
                  if stat.get('name'):
                      print(f"Endpoint: {stat['name']}")
                      print(f"  Requests: {stat['requests_count']}")
                      print(f"  Avg Response Time: {stat['avg_response_time']:.2f}ms")
                      print(f"  Min Response Time: {stat['min_response_time']}ms")
                      print(f"  Max Response Time: {stat['max_response_time']}ms")
                      print(f"  Median Response Time: {stat.get('median_response_time', 0):.2f}ms")
                      print(f"  95th Percentile: {stat.get('percentile_95', 0):.2f}ms")
                      print(f"  Requests/s: {stat['requests_per_second']:.2f}")
                      print(f"  Failures: {stat['failures_count']}")
                      print("")
              
              # Check threshold (p95 < 500ms)
              for stat in stats:
                  if stat.get('name') and 'health' in stat['name'].lower():
                      p95 = stat.get('percentile_95', 0)
                      if p95 > 500:
                          print(f"::warning::Response time for {stat['name']} exceeds 500ms threshold (p95: {p95:.2f}ms)")
              
          except Exception as e:
              print(f"Error parsing results: {e}")
              sys.exit(1)
          EOF

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            locust-results.json
            locust-report.html
          retention-days: 30

  # =============================================================================
  # Stress Tests
  # =============================================================================
  stress-tests:
    name: Stress Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL=redis://localhost:6379/0
          SECRET_KEY=test-secret-key-for-testing
          JWT_SECRET_KEY=test-jwt-secret-key
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          API_V1_PREFIX=/api/v1
          SERVER_NAME=test-server
          EOF

      - name: Start backend server
        run: |
          source .env.test
          uvicorn src.app:app --host 0.0.0.0 --port 18080 &
          sleep 5
          curl -f http://localhost:18080/health || exit 1

      - name: Run stress test
        run: |
          cat > stress_test.py << 'EOF'
          import asyncio
          import aiohttp
          import time
          import statistics

          async def stress_test(base_url, concurrent_users, duration):
              """Run stress test with increasing load"""
              results = []
              start_time = time.time()
              
              async with aiohttp.ClientSession() as session:
                  tasks = []
                  for i in range(concurrent_users):
                      tasks.append(make_request(session, base_url))
                  
                  # Initial burst
                  initial_results = await asyncio.gather(*tasks, return_exceptions=True)
                  results.extend([r for r in initial_results if not isinstance(r, Exception)])
                  
                  # Sustained load
                  while time.time() - start_time < duration:
                      tasks = [make_request(session, base_url) for _ in range(min(10, concurrent_users))]
                      batch_results = await asyncio.gather(*tasks, return_exceptions=True)
                      results.extend([r for r in batch_results if not isinstance(r, Exception)])
                      await asyncio.sleep(0.1)
              
              return results

          async def make_request(session, url):
              try:
                  start = time.time()
                  async with session.get(f"{url}/health") as response:
                      elapsed = (time.time() - start) * 1000
                      return {'status': response.status, 'time': elapsed}
              except Exception as e:
                  return {'error': str(e)}

          async def main():
              base_url = "http://localhost:18080"
              concurrent_users = 200
              duration = 60
              
              print(f"Starting stress test with {concurrent_users} users for {duration}s...")
              results = await stress_test(base_url, concurrent_users, duration)
              
              # Analyze results
              response_times = [r['time'] for r in results if 'time' in r]
              errors = [r for r in results if 'error' in r]
              
              print(f"\n=== Stress Test Results ===")
              print(f"Total Requests: {len(results)}")
              print(f"Successful: {len(response_times)}")
              print(f"Errors: {len(errors)}")
              print(f"Error Rate: {len(errors)/len(results)*100:.2f}%")
              
              if response_times:
                  print(f"\nResponse Time Statistics:")
                  print(f"  Min: {min(response_times):.2f}ms")
                  print(f"  Max: {max(response_times):.2f}ms")
                  print(f"  Avg: {statistics.mean(response_times):.2f}ms")
                  print(f"  Median: {statistics.median(response_times):.2f}ms")
                  p95 = sorted(response_times)[int(len(response_times) * 0.95)]
                  print(f"  95th Percentile: {p95:.2f}ms")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

          python stress_test.py

      - name: Upload stress test results
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results
          path: stress_test.py
          retention-days: 30

  # =============================================================================
  # Performance Benchmark Comparison
  # =============================================================================
  benchmark-comparison:
    name: Performance Benchmark Comparison
    needs: [load-tests, stress-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download previous benchmark
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline
          path: baseline/
        continue-on-error: true

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: current/
        continue-on-error: true

      - name: Compare performance against baseline
        run: |
          echo "=== Performance Benchmark Comparison ==="
          echo ""
          
          if [ -f "baseline/locust-results.json" ]; then
            echo "Previous baseline found. Comparing..."
            python3 << 'EOF'
            import json
            import sys

            try:
                with open('baseline/locust-results.json', 'r') as f:
                    baseline = json.load(f)
                with open('current/locust-results.json', 'r') as f:
                    current = json.load(f)
                
                print("\n=== Performance Comparison ===")
                print(f"Baseline Total Requests: {baseline.get('total_requests', 0)}")
                print(f"Current Total Requests: {current.get('total_requests', 0)}")
                print("")
                
                baseline_stats = {s['name']: s for s in baseline.get('stats', [])}
                current_stats = {s['name']: s for s in current.get('stats', [])}
                
                for name in baseline_stats:
                    if name in current_stats:
                        b = baseline_stats[name]
                        c = current_stats[name]
                        
                        b_p95 = b.get('percentile_95', 0)
                        c_p95 = c.get('percentile_95', 0)
                        
                        if b_p95 > 0:
                            change = ((c_p95 - b_p95) / b_p95) * 100
                            status = "IMPROVED" if change < 0 else "DEGRADED"
                            emoji = "✓" if change < 0 else "✗"
                            
                            print(f"{name}:")
                            print(f"  Baseline p95: {b_p95:.2f}ms")
                            print(f"  Current p95: {c_p95:.2f}ms")
                            print(f"  Change: {change:+.1f}% {emoji} {status}")
                            
                            # Alert on significant degradation
                            if change > 20:
                                print(f"  ::warning::Performance degraded by more than 20%!")
                            print("")
            except Exception as e:
                print(f"Error comparing benchmarks: {e}")
            EOF
          else
            echo "No previous baseline found. Creating new baseline..."
            if [ -f "current/locust-results.json" ]; then
              mkdir -p baseline
              cp current/locust-results.json baseline/
              echo "Baseline created from current results."
            fi
          fi

      - name: Save as new baseline
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: current/
          retention-days: 365

  # =============================================================================
  # Performance Report
  # =============================================================================
  performance-report:
    name: Generate Performance Report
    needs: [load-tests, stress-tests, benchmark-comparison]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all performance results
        uses: actions/download-artifact@v4
        with:
          path: perf-results
          merge-multiple: true

      - name: Generate performance report
        run: |
          cat > performance-report.md << 'EOF'
          # Performance Test Report

          ## Test Configuration
          - **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Trigger:** ${{ github.event_name == 'schedule' && 'Scheduled (Daily)' || 'Manual' }}
          - **Concurrent Users:** ${{ needs.setup.outputs.concurrent_users }}
          - **Duration:** ${{ needs.setup.outputs.duration }}s

          ## Test Categories

          ### 1. Load Tests
          - Simulated ${{ needs.setup.outputs.concurrent_users }} concurrent users
          - Measured response times and throughput
          - Generated detailed Locust reports

          ### 2. Stress Tests
          - Tested system breaking points
          - Measured error rates under stress
          - Identified performance bottlenecks

          ### 3. Benchmark Comparison
          - Compared against historical baseline
          - Identified performance trends
          - Alerted on significant degradation

          ## Key Metrics

          | Metric | Value | Threshold | Status |
          |--------|-------|-----------|--------|
          | p95 Response Time | See details | < 500ms | TBD |
          | Error Rate | See details | < 1% | TBD |
          | Throughput | See details | Baseline | TBD |

          ## Recommendations

          Based on the test results, the following recommendations are made:
          - Review any endpoints with p95 > 500ms
          - Investigate error spikes during stress tests
          - Monitor performance trends over time

          ## Artifacts

          All detailed performance data is available in the GitHub Actions artifacts.
          EOF

          # Replace placeholder with actual date
          sed -i "s/\$(date -u '+%Y-%m-%d %H:%M:%S UTC')/$(date -u '+%Y-%m-%d %H:%M:%S UTC')/g" performance-report.md

          cat performance-report.md

      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report.md
          retention-days: 30

  # =============================================================================
  # Performance Alert
  # =============================================================================
  performance-alert:
    name: Performance Alert
    needs: [load-tests, stress-tests, benchmark-comparison]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      always() &&
      needs.load-tests.result != 'success'

    steps:
      - name: Check for performance issues
        run: |
          echo "=== Performance Alert ==="
          echo ""
          echo "Load Tests: ${{ needs.load-tests.result }}"
          echo "Stress Tests: ${{ needs.stress-tests.result }}"
          echo "Benchmark Comparison: ${{ needs.benchmark-comparison.result }}"
          echo ""

          if [[ "${{ needs.load-tests.result }}" != "success" ]]; then
            echo "::warning::Performance tests completed with issues. Review the detailed report."
          fi

          if [[ "${{ needs.benchmark-comparison.result }}" == "failure" ]]; then
            echo "::error::Performance degradation detected! Immediate attention required."
          fi