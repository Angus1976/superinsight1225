[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test markers
markers =
    unit: Fast unit tests that don't require external services
    integration: Integration tests that require external services (database, redis)
    e2e: End-to-end tests using Playwright
    property: Property-based tests using Hypothesis
    performance: Performance and load tests
    security: Security vulnerability tests
    docker: Tests that require Docker and docker-compose
    deployment: Deployment validation tests
    health: Health check tests
    network: Network connectivity tests
    environment: Environment variable tests
    migration: Database migration tests
    slow: Slow running tests (>1 second)
    smoke: Quick smoke tests for basic functionality

# Output configuration
# 内存提示：默认开启 coverage + 多份报告会显著增加内存与磁盘占用。
# 本地迭代请使用：python3 -m pytest … --no-cov
# 或：./scripts/run-unit-lowmem.sh（见 scripts/run-tests-fast.sh）
#
# 关注峰值常驻内存（Max RSS / ru_maxrss，单次 pytest 进程）：
#   PYTEST_REPORT_MAXRSS=1 python3 -m pytest tests/unit/ --no-cov -q
#   ./scripts/run-unit-lowmem.sh --mem
# 说明见 tests/conftest.py 中 pytest_sessionfinish。
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=json:.coverage.json
    --cov-fail-under=80
    -ra
    --maxfail=5

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */migrations/*
    */alembic/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov
