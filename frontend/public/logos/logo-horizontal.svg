<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <defs>
    <linearGradient id="wGradH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C5CDD4"/>
      <stop offset="15%" stop-color="#ADB5BD"/>
      <stop offset="50%" stop-color="#8B9299"/>
      <stop offset="85%" stop-color="#6B7278"/>
      <stop offset="100%" stop-color="#5B6269"/>
    </linearGradient>
    
    <linearGradient id="metalShineH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>
    
    <radialGradient id="blueGlassH" cx="32%" cy="32%">
      <stop offset="0%" stop-color="#D4E8F5"/>
      <stop offset="15%" stop-color="#A3D0E8"/>
      <stop offset="35%" stop-color="#6BA5CD"/>
      <stop offset="60%" stop-color="#4A8FBD"/>
      <stop offset="80%" stop-color="#2D5F7F"/>
      <stop offset="100%" stop-color="#1A3A4D"/>
    </radialGradient>
    
    <radialGradient id="glassHLH" cx="28%" cy="28%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="25%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="75%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="rimLightH" cx="80%" cy="50%">
      <stop offset="0%" stop-color="#6BA5CD" stop-opacity="0"/>
      <stop offset="70%" stop-color="#6BA5CD" stop-opacity="0"/>
      <stop offset="90%" stop-color="#A3D0E8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4E8F5" stop-opacity="0.9"/>
    </radialGradient>
    
    <radialGradient id="sphereAOH" cx="50%" cy="70%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="60%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.4"/>
    </radialGradient>
    
    <filter id="shadowH">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="5"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerShH" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="3"/>
      <feFlood flood-color="#000" flood-opacity="0.25"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- W + 球体，缩小并左移 -->
  <g transform="translate(10, -10) scale(0.8)">
    <ellipse cx="50" cy="95" rx="35" ry="3" fill="rgba(0,0,0,0.12)"/>
    
    <path d="M10,35 L20,35 L35,80 L45,50 L55,50 L65,80 L80,20 L90,20 L70,95 L60,95 L50,65 L40,95 L30,95 Z" 
          fill="rgba(0,0,0,0.2)" 
          transform="translate(3, 5)"/>
    
    <path d="M10,35 L20,35 L35,80 L45,50 L55,50 L65,80 L80,20 L90,20 L70,95 L60,95 L50,65 L40,95 L30,95 Z" 
          fill="url(#wGradH)" 
          filter="url(#innerShH)"/>
    
    <path d="M10,35 L20,35 L35,80 L45,50 L55,50 L65,80 L80,20 L90,20 L70,95 L60,95 L50,65 L40,95 L30,95 Z" 
          fill="url(#metalShineH)"/>
    
    <path d="M11,36 L19.5,36 L33,77 L44,51 L54,51 L63,77 L78.5,21 L89,21" 
          fill="none" 
          stroke="white" 
          stroke-width="2" 
          stroke-linecap="round" 
          opacity="0.6"/>
    
    <path d="M13,37 L19,37 L32,75 L43.5,52 L53.5,52 L62,75 L78,22 L87,22" 
          fill="none" 
          stroke="white" 
          stroke-width="0.8" 
          stroke-linecap="round" 
          opacity="0.4"/>
    
    <ellipse cx="86" cy="18" rx="7" ry="2.5" fill="rgba(0,0,0,0.3)"/>
    <ellipse cx="85" cy="16.5" rx="5" ry="1.5" fill="rgba(0,0,0,0.4)"/>
    
    <circle cx="85" cy="12" r="8" fill="url(#blueGlassH)" filter="url(#shadowH)"/>
    <circle cx="85" cy="12" r="8" fill="url(#sphereAOH)"/>
    <circle cx="85" cy="12" r="8" fill="url(#rimLightH)"/>
    <circle cx="85" cy="12" r="8" fill="url(#glassHLH)"/>
    
    <ellipse cx="82.5" cy="9.5" rx="3.5" ry="3" fill="white" opacity="0.9"/>
    <ellipse cx="83.5" cy="10.5" rx="2" ry="1.5" fill="white" opacity="0.7"/>
    <circle cx="81.5" cy="9" r="1.5" fill="white" opacity="1"/>
    <circle cx="84" cy="11" r="0.8" fill="white" opacity="0.9"/>
    
    <circle cx="85" cy="13" r="6" fill="none" stroke="#6BA5CD" stroke-width="0.5" opacity="0.4"/>
    <ellipse cx="87" cy="12" rx="1" ry="5" fill="white" opacity="0.2"/>
  </g>

  <!-- 品牌文字 -->
  <text x="110" y="32" 
        font-family="PingFang SC, Microsoft YaHei, Noto Sans SC, sans-serif" 
        font-size="20" 
        font-weight="700" 
        fill="#34495E"
        letter-spacing="1.5">
    问视间
  </text>

  <text x="110" y="52" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="14" 
        font-weight="700" 
        fill="#5D6D7E"
        letter-spacing="2.5">
    WINSAI
  </text>

  <line x1="185" y1="42" x2="185" y2="52" stroke="currentColor" stroke-width="1" opacity="0.15"/>

  <text x="195" y="52" 
        font-family="PingFang SC, Microsoft YaHei, sans-serif" 
        font-size="11" 
        fill="#85929E" 
        opacity="0.8"
        letter-spacing="0.5">
    数据友好 · 智赢未来
  </text>
</svg>
