<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096DD9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="label" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52C41A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389E0D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="64" cy="64" r="56" fill="url(#bg)" opacity="0.1"/>

  <!-- Data Grid Lines -->
  <g stroke="#1890FF" stroke-width="1.5" opacity="0.3">
    <line x1="24" y1="24" x2="104" y2="24"/>
    <line x1="24" y1="44" x2="104" y2="44"/>
    <line x1="24" y1="64" x2="104" y2="64"/>
    <line x1="24" y1="84" x2="104" y2="84"/>
    <line x1="24" y1="104" x2="104" y2="104"/>
    <line x1="24" y1="24" x2="24" y2="104"/>
    <line x1="104" y1="24" x2="104" y2="104"/>
  </g>

  <!-- W Shape -->
  <path d="M 32 40 L 44 84 L 56 40 L 64 84 L 72 40 L 84 84 L 96 40" 
        stroke="#1890FF" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Data Points -->
  <circle cx="44" cy="84" r="6" fill="white" filter="url(#glow)"/>
  <circle cx="64" cy="84" r="6" fill="white" filter="url(#glow)"/>
  <circle cx="84" cy="84" r="6" fill="white" filter="url(#glow)"/>

  <!-- Annotation Label -->
  <g transform="translate(84, 28)">
    <rect x="0" y="0" width="28" height="20" rx="4" fill="url(#label)"/>
    <circle cx="14" cy="24" r="4" fill="url(#label)"/>
    <line x1="14" y1="20" x2="14" y2="24" stroke="url(#label)" stroke-width="3"/>
  </g>

  <!-- Data Flow Curves -->
  <g stroke="#1890FF" stroke-width="3" fill="none" opacity="0.4">
    <path d="M 36 96 Q 44 88, 52 96"/>
    <path d="M 56 96 Q 64 88, 72 96"/>
    <path d="M 76 96 Q 84 88, 92 96"/>
  </g>

  <!-- AI Indicator -->
  <g opacity="0.6">
    <circle cx="96" cy="48" r="10" fill="none" stroke="#722ED1" stroke-width="1.5"/>
    <circle cx="96" cy="48" r="7" fill="none" stroke="#722ED1" stroke-width="1.5"/>
    <circle cx="96" cy="48" r="4" fill="#722ED1"/>
  </g>
</svg>
