version: '3.8'
# 本机跑 API（python main.py 占用 18080）时，不要同时启动 Docker 里的 app，否则会抢端口。
# 默认 compose 不启动 app/celery-worker；需要容器内后端时加：docker compose --profile docker-backend up -d
# docker-backend 同时包含 openclaw-core + openclaw-gateway，使 app 可访问 http://openclaw-gateway:3000。
# 若还需 openclaw-agent，请叠加：-f docker-compose.ai-integration.yml（勿重复定义同名服务时可去掉 ai 文件中的 gateway/core）。

services:
  # ===========================================================================
  # Frontend
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-}
    container_name: superinsight-frontend
    ports:
      - "15173:5173"
    environment:
      # 与 frontend/.env.development 一致：避免浏览器对 localhost→::1 时与 IPv4 后端/Docker 双监听冲突
      - VITE_API_BASE_URL=http://127.0.0.1:18080
      # 本机 API 时默认代理到宿主机 18080；若启用 profile docker-backend 跑容器 app，请在 .env 设 VITE_DEV_PROXY_TARGET=http://app:8000
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET:-http://host.docker.internal:18080}
      - NODE_ENV=development
    # node_modules 来自镜像构建时的 npm ci；若新增/升级 frontend 依赖，请执行:
    #   docker compose build frontend && docker compose up -d frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Core Application（可选：与本机 main.py 二选一占用 18080，见文件头说明）
  # ===========================================================================
  app:
    profiles:
      - docker-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://repo.huaweicloud.com/repository/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-repo.huaweicloud.com}
    container_name: superinsight-app
    ports:
      - "18080:8000"
    environment:
      # 与 ports 中 18080:8000 一致：容器内必须监听 8000，宿主机才映射到 18080
      - PORT=8000
      - APP_ENV=development
      - DATABASE_URL=postgresql://superinsight:password@postgres:5432/superinsight
      - REDIS_URL=redis://redis:6379/0
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_TOKEN=${LABEL_STUDIO_API_TOKEN}
      - LABEL_STUDIO_SSO_ENABLED=true
      - LABEL_STUDIO_SSO_EMAIL=admin@superinsight.local
      - ARGILLA_URL=http://argilla:6900
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:15173
      # OpenClaw：与 openclaw-gateway 同 profile docker-backend 一并启动；连不上时回退内置 LLM
      - OPENCLAW_GATEWAY_BASE_URL=${OPENCLAW_GATEWAY_BASE_URL:-http://openclaw-gateway:3000}
    depends_on:
      - postgres
      - redis
      - label-studio
      - argilla
      - ollama
    volumes:
      - ./main.py:/app/main.py
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Celery Worker (Background Tasks)
  # ===========================================================================
  celery-worker:
    profiles:
      - docker-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://repo.huaweicloud.com/repository/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-repo.huaweicloud.com}
    container_name: superinsight-celery-worker
    command: celery -A src.services.structuring_pipeline worker --loglevel=info --include=src.services.vectorization_pipeline,src.services.semantic_pipeline
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://superinsight:password@postgres:5432/superinsight
      - REDIS_URL=redis://redis:6379/0
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_TOKEN=${LABEL_STUDIO_API_TOKEN}
      - LABEL_STUDIO_SSO_ENABLED=true
      - LABEL_STUDIO_SSO_EMAIL=admin@superinsight.local
      - ARGILLA_URL=http://argilla:6900
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - LLM_ENCRYPTION_KEY=${LLM_ENCRYPTION_KEY}
    depends_on:
      - postgres
      - redis
      - app
    volumes:
      - ./main.py:/app/main.py
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.services.structuring_pipeline inspect ping --timeout 5 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # OpenClaw（与 app 同 profile，便于 superinsight-app 直连 openclaw-gateway:3000）
  # 完整 Agent 栈仍可用：docker compose -f docker-compose.yml -f docker-compose.ai-integration.yml up -d
  # ===========================================================================
  openclaw-core:
    profiles:
      - docker-backend
    image: ghcr.io/openclaw/openclaw:latest
    container_name: superinsight-openclaw-core
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-shared-secret}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ./deploy/ai-integration/openclaw-core/dot-openclaw:/home/node/.openclaw
    ports:
      - "${OPENCLAW_CORE_HOST_PORT:-18789}:18789"
    depends_on:
      - ollama
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - lan
      - --port
      - "18789"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  openclaw-gateway:
    profiles:
      - docker-backend
    build:
      context: ./deploy/ai-integration/openclaw-gateway
      dockerfile: Dockerfile
    container_name: superinsight-openclaw-gateway
    ports:
      - "${OPENCLAW_GATEWAY_HOST_PORT:-3001}:3000"
    environment:
      - SUPERINSIGHT_API_URL=http://app:8000
      - SUPERINSIGHT_API_KEY=${OPENCLAW_API_KEY:-dev-openclaw-api-key}
      - SUPERINSIGHT_TENANT_ID=${TENANT_ID:-00000000-0000-0000-0000-000000000001}
      - GATEWAY_PORT=3000
      - GATEWAY_HOST=0.0.0.0
      - NODE_ENV=${NODE_ENV:-production}
      - OPENCLAW_CORE_URL=${OPENCLAW_CORE_URL:-http://openclaw-core:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-shared-secret}
      - AGENT_URL=${AGENT_URL:-http://openclaw-agent:8080}
      - LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}
    volumes:
      - openclaw_config:/app/config
      - openclaw_memory:/app/memory
      - openclaw_logs:/app/logs
    depends_on:
      - app
      - openclaw-core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ===========================================================================
  # Database
  # ===========================================================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: superinsight-postgres
    environment:
      - POSTGRES_USER=superinsight
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=superinsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superinsight"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: superinsight-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # Label Studio (with SSO support)
  # ===========================================================================
  label-studio:
    build:
      context: ./deploy/label-studio
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://repo.huaweicloud.com/repository/pypi/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-repo.huaweicloud.com}
    container_name: superinsight-label-studio
    ports:
      - "8080:8080"
    environment:
      # Core configuration
      - LABEL_STUDIO_HOST=http://localhost:8080
      - LABEL_STUDIO_USERNAME=admin@superinsight.local
      - LABEL_STUDIO_PASSWORD=admin
      # Language configuration (Django i18n)
      - LANGUAGE_CODE=zh-hans
      - LABEL_STUDIO_DEFAULT_LANGUAGE=zh
      - LABEL_STUDIO_ENABLE_LANGUAGE_PARAM=true
      # SSO configuration - enabled for auto-login via ?token=xxx
      - LABEL_STUDIO_SSO_ENABLED=true
      - LABEL_STUDIO_SSO_EMAIL=admin@superinsight.local
      # Other settings
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=false
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data
    volumes:
      - label_studio_data:/label-studio/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Argilla
  # ===========================================================================
  argilla:
    image: argilla/argilla-server:latest
    container_name: superinsight-argilla
    ports:
      - "6900:6900"
    environment:
      - ARGILLA_HOME_PATH=/argilla
      - ARGILLA_ELASTICSEARCH=http://elasticsearch:9200
      - ARGILLA_DATABASE_URL=postgresql://superinsight:password@postgres:5432/argilla
      - ARGILLA_REDIS_URL=redis://redis:6379/0
    depends_on:
      - elasticsearch
      # - postgres  # 已禁用，使用宿主机 PostgreSQL
      - redis
    volumes:
      - argilla_data:/argilla
    user: "0:0"  # Run as root to fix permission issues
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6900/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Elasticsearch (for Argilla)
  # ===========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: superinsight-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx512m"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Ollama (Local LLM)
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: superinsight-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 14G
          cpus: '6'
        reservations:
          memory: 8G
          cpus: '2'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Prometheus (Metrics)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: superinsight-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Grafana (Monitoring Dashboard)
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: superinsight-grafana
    ports:
      # Host 3000 must match tests and tooling (localhost:3000/api/health). Container listens on 3000.
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  label_studio_data:
    driver: local
  argilla_data:
    driver: local
  elasticsearch_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  openclaw_config:
    driver: local
  openclaw_memory:
    driver: local
  openclaw_logs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    name: superinsight_network
    driver: bridge
