<svg width="320" height="64" viewBox="0 0 320 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096DD9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hLabelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52C41A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389E0D;stop-opacity:1" />
    </linearGradient>
    <filter id="hGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon Section -->
  <g>
    <!-- Background Circle -->
    <circle cx="32" cy="32" r="28" fill="url(#hBgGrad)" opacity="0.1"/>

    <!-- Data Grid -->
    <g stroke="#1890FF" stroke-width="0.8" opacity="0.3">
      <line x1="12" y1="12" x2="52" y2="12"/>
      <line x1="12" y1="22" x2="52" y2="22"/>
      <line x1="12" y1="32" x2="52" y2="32"/>
      <line x1="12" y1="42" x2="52" y2="42"/>
      <line x1="12" y1="52" x2="52" y2="52"/>
      <line x1="12" y1="12" x2="12" y2="52"/>
      <line x1="52" y1="12" x2="52" y2="52"/>
    </g>

    <!-- W Shape -->
    <path d="M 16 20 L 22 42 L 28 20 L 32 42 L 36 20 L 42 42 L 48 20" 
          stroke="#1890FF" 
          stroke-width="3" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <!-- Data Points -->
    <circle cx="22" cy="42" r="3" fill="white" filter="url(#hGlow)"/>
    <circle cx="32" cy="42" r="3" fill="white" filter="url(#hGlow)"/>
    <circle cx="42" cy="42" r="3" fill="white" filter="url(#hGlow)"/>

    <!-- Label -->
    <g transform="translate(42, 14)">
      <rect x="0" y="0" width="14" height="10" rx="2" fill="url(#hLabelGrad)"/>
      <circle cx="7" cy="12" r="2" fill="url(#hLabelGrad)"/>
      <line x1="7" y1="10" x2="7" y2="12" stroke="url(#hLabelGrad)" stroke-width="1.5"/>
    </g>

    <!-- Curves -->
    <g stroke="#1890FF" stroke-width="1.5" fill="none" opacity="0.4">
      <path d="M 18 48 Q 22 44, 26 48"/>
      <path d="M 28 48 Q 32 44, 36 48"/>
      <path d="M 38 48 Q 42 44, 46 48"/>
    </g>

    <!-- AI Indicator -->
    <g opacity="0.6">
      <circle cx="48" cy="24" r="5" fill="none" stroke="#722ED1" stroke-width="0.8"/>
      <circle cx="48" cy="24" r="3.5" fill="none" stroke="#722ED1" stroke-width="0.8"/>
      <circle cx="48" cy="24" r="2" fill="#722ED1"/>
    </g>
  </g>

  <!-- Text Section -->
  <g>
    <!-- Main Title: 问视间 (SuperInsight) -->
    <text x="76" y="30" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="600" fill="currentColor">
      问视间
    </text>
    <text x="145" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="currentColor" opacity="0.7">
      (SuperInsight)
    </text>

    <!-- Subtitle -->
    <text x="76" y="48" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" fill="currentColor" opacity="0.6">
      数据标注，智见未来 / Data Annotation, Intelligent Insight
    </text>
  </g>
</svg>
