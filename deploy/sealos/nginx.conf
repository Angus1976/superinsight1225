server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # K8s DNS resolver（动态解析，避免后端未就绪时 nginx 拒绝启动）
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理 → 后端服务（变量方式，延迟解析）
    location /api/ {
        set $backend http://superinsight-backend.ns-7a6zs8pw.svc.cluster.local:8000;
        proxy_pass $backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket 支持
    location /ws/ {
        set $backend_ws http://superinsight-backend.ns-7a6zs8pw.svc.cluster.local:8000;
        proxy_pass $backend_ws/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
