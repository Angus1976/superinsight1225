name: Pull Request Tests

# Requirement 10.2: Execute integration tests on pull requests
# Requirement 10.7: Prevent merging if critical tests fail
on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  workflow_call:
    secrets: inherit
    inputs:
      hypothesis_profile:
        description: 'HYPOTHESIS_PROFILE for backend pytest in integration job (commit-tests sets its own via with).'
        type: string
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  BACKEND_URL: 'http://localhost:8000'
  FRONTEND_URL: 'http://localhost:3000'

jobs:
  # =============================================================================
  # Commit Tests (from commit-tests workflow)
  # =============================================================================
  commit-tests:
    name: Commit Tests
    uses: ./.github/workflows/commit-tests.yml
    secrets: inherit
    with:
      hypothesis_profile: ${{ github.event_name == 'pull_request' && 'dev' || inputs.hypothesis_profile }}

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-integration-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-integration-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx testcontainers
          pip install -r requirements.txt || true

      - name: Create test environment file
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL=redis://localhost:6379/0
          SECRET_KEY=test-secret-key-for-testing
          JWT_SECRET_KEY=test-jwt-secret-key
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          API_V1_PREFIX=/api/v1
          SERVER_NAME=test-server
          EOF

      - name: Set HYPOTHESIS_PROFILE for integration pytest
        run: |
          case "${{ github.event_name }}" in
            pull_request)
              echo "HYPOTHESIS_PROFILE=dev" >> "$GITHUB_ENV"
              ;;
            workflow_call)
              P='${{ inputs.hypothesis_profile }}'
              if [ -n "$P" ]; then
                echo "HYPOTHESIS_PROFILE=$P" >> "$GITHUB_ENV"
              else
                echo "HYPOTHESIS_PROFILE=default" >> "$GITHUB_ENV"
              fi
              ;;
            *)
              echo "HYPOTHESIS_PROFILE=default" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Run integration tests
        run: |
          pytest tests/ \
            -m "integration" \
            --tb=short \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=json:.coverage-integration.json \
            --maxfail=10

      - name: Run API integration tests
        run: |
          pytest tests/test_integration_api.py \
            tests/test_api_endpoints.py \
            --tb=short \
            -v \
            --maxfail=5

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: .coverage-integration.json
          retention-days: 7

  # =============================================================================
  # Dependency Vulnerability Scan
  # =============================================================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit

      - name: Check Python dependencies with Safety
        run: |
          safety check -r requirements.txt --full-report || true
        continue-on-error: true

      - name: Audit Python dependencies with pip-audit
        run: |
          pip-audit -r requirements.txt || true
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          npm audit --audit-level=high || true

      - name: Upload dependency scan results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: .
          retention-days: 7
        if: always()

  # =============================================================================
  # Code Quality Check
  # =============================================================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Check code formatting
        run: |
          black --check --diff src/ tests/ || echo "::warning::Code formatting issues found"
        continue-on-error: true

      - name: Check import sorting
        run: |
          isort --check-only --diff src/ tests/ || echo "::warning::Import sorting issues found"
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: |
          npm run lint || echo "::warning::ESLint issues found"
        continue-on-error: true

  # =============================================================================
  # Test Report Generation
  # =============================================================================
  test-report:
    name: Generate Test Report
    needs: [commit-tests, integration-tests, dependency-scan, code-quality]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results
          merge-multiple: true

      - name: Generate PR test report
        run: |
          echo "=== Pull Request Test Report ===" > pr-test-report.md
          echo "" >> pr-test-report.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> pr-test-report.md
          echo "**PR:** ${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}" >> pr-test-report.md
          echo "" >> pr-test-report.md
          echo "## Test Results Summary" >> pr-test-report.md
          echo "" >> pr-test-report.md
          echo "| Test Category | Status |" >> pr-test-report.md
          echo "|---------------|--------|" >> pr-test-report.md
          echo "| Commit Tests | ${{ needs.commit-tests.result }} |" >> pr-test-report.md
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> pr-test-report.md
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> pr-test-report.md
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> pr-test-report.md
          echo "" >> pr-test-report.md
          echo "## Artifacts" >> pr-test-report.md
          echo "" >> pr-test-report.md
          echo "All test artifacts have been uploaded and are available in the GitHub Actions run." >> pr-test-report.md
          echo "" >> pr-test-report.md
          cat pr-test-report.md

      - name: Upload PR test report
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-report
          path: pr-test-report.md
          retention-days: 7

  # =============================================================================
  # Merge Gate (Requirement 10.7)
  # =============================================================================
  merge-gate:
    name: Merge Gate
    needs: [commit-tests, integration-tests, dependency-scan, code-quality]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false

    steps:
      - name: Check merge eligibility
        run: |
          echo "=== Merge Gate Check ==="
          echo ""
          echo "Commit Tests: ${{ needs.commit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo ""

          # Check for critical failures
          if [[ "${{ needs.commit-tests.result }}" == "failure" ]]; then
            echo "::error::Commit tests failed. Cannot merge."
            exit 1
          fi

          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "::error::Integration tests failed. Cannot merge."
            exit 1
          fi

          # Dependency scan and code quality are warnings, not blockers
          echo ""
          echo "✓ All critical tests passed. PR is eligible for merge."
          echo "Note: Review dependency scan and code quality warnings before merging."

      - name: Add merge success label
        if: success()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: 'ready-to-merge'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add merge failed label
        if: failure()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: 'merge-blocked'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}